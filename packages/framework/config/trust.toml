# Trust matrix -- per-domain autonomy levels
# Values: "autopilot" | "co-pilot" | "advisory"

[domains]
architecture = "co-pilot"
dependencies = "co-pilot"
implementation = "autopilot"
testing = "autopilot"
documentation = "autopilot"
product_strategy = "advisory"

[approval]
# Decomposition approval tiers:
#   "always" (advisory) -- user approves at every level
#   "strategic" (co-pilot) -- user approves epics, orchestrator handles features->tasks
#   "none" (autopilot) -- fully autonomous, user sees progress
decomposition = "strategic"

# Decision tier authority -- which tiers each agent can store decisions at
# Tier 0 = Product Strategy, Tier 1 = Architecture, Tier 2 = Functional Design, Tier 3 = Execution
[tier_authority]
synapse-orchestrator = [0, 1, 2, 3]
product-strategist = [0, 1]
architect = [1, 2]
decomposer = [2]
plan-reviewer = []
executor = [3]
validator = []
integration-checker = []
researcher = []
debugger = []
codebase-analyst = []

# Per-agent domain overrides (optional -- uncomment to customize)
# [agent_overrides.executor.domains]
# architecture = "advisory"

# RPEV workflow control -- involvement matrix and retry caps
# Modes: drives | co-pilot | reviews | autopilot | monitors
#   drives    = user initiates the action
#   co-pilot  = agent proposes, user approves
#   reviews   = agent does, user reviews output
#   autopilot = agent does, no user involvement
#   monitors  = agent does, user notified + can intervene

[rpev.involvement]
# Per-level x per-stage involvement matrix (4 levels x 4 stages = 16 entries)
project_refine   = "drives"
project_plan     = "co-pilot"
project_execute  = "monitors"
project_validate = "monitors"

epic_refine   = "co-pilot"
epic_plan     = "reviews"
epic_execute  = "autopilot"
epic_validate = "monitors"

feature_refine   = "reviews"
feature_plan     = "autopilot"
feature_execute  = "autopilot"
feature_validate = "autopilot"

work_package_refine   = "autopilot"
work_package_plan     = "autopilot"
work_package_execute  = "autopilot"
work_package_validate = "autopilot"

[rpev.domain_overrides]
# Override involvement for specific domains regardless of level
# Format: {domain}_{stage} = "mode"
# Example: security_execute = "co-pilot"

[rpev]
explicit_gate_levels = ["project", "epic"]
proactive_notifications = false
# Maximum concurrent agent slots in the pool (all agent types share this limit)
max_pool_slots = 3
# Maximum retry attempts per layer before escalation
max_retries_task = 3
max_retries_feature = 2
max_retries_epic = 1
